
services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/backend
    ports:
      - '8000:8000'
    environment:
      - DEBUG=1
      - SECRET_KEY=${SECRET_KEY:-fdnbcdkoceowndsdkekewfnmdvkjdsuedfsd}
      - ALLOWED_HOSTS=localhost 127.0.0.1 [::1]
    restart: unless-stopped